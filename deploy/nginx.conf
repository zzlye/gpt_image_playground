server {
    listen ${HOST}:${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 600m;
    add_header Referrer-Policy "unsafe-url" always;

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # 静态资源长缓存（Vite 生成的带 hash 文件名）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 公开只读代理：用于系统公告和随机背景元数据，避免浏览器 CORS 拦截。
    location /wy-public/wenyun/ {
        limit_except GET OPTIONS {
            deny all;
        }

        proxy_pass https://zzlye.xyz:60/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name zzlye.xyz;
        proxy_set_header Host zzlye.xyz:60;
        proxy_connect_timeout 10s;
        proxy_send_timeout 20s;
        proxy_read_timeout 20s;
        proxy_buffering off;
    }

    location /wy-public/mukyu/ {
        limit_except GET OPTIONS {
            deny all;
        }

        proxy_pass https://i.mukyu.ru/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name i.mukyu.ru;
        proxy_set_header Host i.mukyu.ru;
        proxy_connect_timeout 10s;
        proxy_send_timeout 20s;
        proxy_read_timeout 20s;
        proxy_buffering off;
    }

    # 内置图片 API 代理：两个固定站点各走自己的 /v1，避免文运站和公益站互相串线。
    location /api-proxy/wenyun/ {
        limit_except GET POST OPTIONS {
            deny all;
        }

        proxy_pass https://zzlye.xyz:60/v1/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name zzlye.xyz;
        proxy_set_header Host zzlye.xyz:60;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 900s;
        proxy_read_timeout 900s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location /api-proxy/public/ {
        limit_except GET POST OPTIONS {
            deny all;
        }

        proxy_pass https://1520635.xyz:3901/v1/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name 1520635.xyz;
        proxy_set_header Host 1520635.xyz:3901;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 900s;
        proxy_read_timeout 900s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # NewAPI 根路径代理：余额、公告、价格接口不在 /v1 下，必须单独转发根路径。
    location /newapi-proxy/wenyun/ {
        limit_except GET POST OPTIONS {
            deny all;
        }

        proxy_pass https://zzlye.xyz:60/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name zzlye.xyz;
        proxy_set_header Host zzlye.xyz:60;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 900s;
        proxy_read_timeout 900s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location /newapi-proxy/public/ {
        limit_except GET POST OPTIONS {
            deny all;
        }

        proxy_pass https://1520635.xyz:3901/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name 1520635.xyz;
        proxy_set_header Host 1520635.xyz:3901;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 60s;
        proxy_send_timeout 900s;
        proxy_read_timeout 900s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # BEGIN API PROXY
    # API 代理。前端请求同源 /api-proxy/...，由 Nginx 转发到部署时配置的 API_PROXY_URL。
    location /api-proxy/ {
        limit_except GET POST OPTIONS {
            deny all;
        }

        if ($uri = "/api-proxy/") {
            return 403 "Forbidden: API Proxy path required";
        }

        proxy_pass ${API_PROXY_URL}/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name $proxy_host;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 900s;
        proxy_read_timeout 900s;
        proxy_buffering off;
        proxy_request_buffering off;
    }
    # END API PROXY

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
